<h1>Organic Vegetables Store</h1>

{% for product in products %}
    <div>
        <h2>{{ product.name }}</h2>
        <p>{{ product.description }}</p>
        <p>Price: ₹{{ product.price }}</p>
        <p>Stock Available: {{ product.stock_quantity }}</p>
        <a href="{% url 'product_detail' product.id %}">View Details</a>
    </div>
{% endfor %}
